name: "❓ Question / Discussion"
description: "Ask a question or start a discussion about the project."
title: "[QUESTION] "
labels: ["question"]
assignees: ["dheid"]
body:
  - type: markdown
    attributes:
      value: |
        Got a question or want to discuss something? You're in the right place!
  - type: textarea
    id: question
    attributes:
      label: What's on your mind?
      description: "Ask your question or describe the topic you'd like to discuss."
      placeholder: "e.g., How do I integrate adocfmt with my pre-commit hooks?"
    validations:
      required: true
