name: "🚀 Feature Request"
description: "Suggest an idea or a new formatting rule for adocfmt."
title: "[FEATURE] "
labels: ["enhancement"]
assignees: ["dheid"]
body:
  - type: markdown
    attributes:
      value: |
        We love new ideas! Please describe the feature you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "e.g., I'm always frustrated when..."
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: "e.g., I would like a new option to --indent-lists."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
