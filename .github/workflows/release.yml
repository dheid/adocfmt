name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
          cache: 'maven'

      - name: Build and Package
        run: mvn -B package -DskipTests

      - name: Publish Core to Maven Central
        run: mvn -B deploy -Prelease -DskipTests -Djacoco.skip=true
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install nFPM
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install nfpm

      - name: Create Linux Packages
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION#v}
          export VERSION
          nfpm pkg --packager deb --target .
          nfpm pkg --packager rpm --target .

      - name: Generate Checksums
        run: |
          sha256sum cli/target/adocfmt.jar cli/target/adocfmt.exe *.deb *.rpm > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli/target/adocfmt.jar
            cli/target/adocfmt.exe
            *.deb
            *.rpm
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Formula
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION#v}
          SHA256=$(sha256sum cli/target/adocfmt.jar | awk '{print $1}')
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/adocfmt.jar"

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/drjekyll-org/homebrew-tap.git homebrew-tap
          cd homebrew-tap

          cat <<EOF > Formula/adocfmt.rb
          class Adocfmt < Formula
            desc "An opinionated AsciiDoc formatter"
            homepage "https://github.com/dheid/adocfmt"
            url "${URL}"
            version "${VERSION}"
            sha256 "${SHA256}"
            license "Apache-2.0"

            depends_on "openjdk@17"

            def install
              libexec.install "adocfmt.jar"
              bin.write_jar_script libexec/"adocfmt.jar", "adocfmt", java_version: "17"
            end

            test do
              system "#{bin}/adocfmt", "--help"
            end
          end
          EOF

          git config user.name "Daniel Heid"
          git config user.email "mail@daniel-heid.de"
          git add Formula/adocfmt.rb
          git commit -m "Update adocfmt to ${VERSION}"
          git push
